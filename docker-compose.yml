services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: systock_app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - systock_network

  db:
    image: postgres:15-alpine
    container_name: systock_db
    restart: always
    env_file: 
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - systock_network

  nginx:
    image: nginx:latest
    container_name: systock_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/default.conf:/etc/nginx/sites-available/default
      - ./docker/nginx/default.conf:/etc/nginx/sites-enabled/default
    depends_on:
      - app 
    networks:
      - systock_network

networks:
  systock_network:
    driver: bridge

volumes:
  db_data: